<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lesson 1: The Heart of a Champion</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8e8e;
            --secondary: #ae3ec9;
            --bg: #fdf6f0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 10px;
            overflow-x: hidden;
            position: relative;
        }

        #fixed-bg {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -3;
            opacity: 0.1;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            will-change: transform;
        }

        .page-title {
            margin: 5px;
            color: #d63384;
            position: relative;
            z-index: 20;
            text-align: center;
            padding: 0 12px;
        }

        #progress {
            color: #666;
            font-weight: bold;
            position: relative;
            z-index: 20;
            margin-bottom: 2px;
        }

        .card-container {
            width: 340px;
            max-width: calc(100vw - 24px);
            height: 400px;
            perspective: 1000px;
            -webkit-perspective: 1000px;
            cursor: pointer;
            margin-top: 10px;
            z-index: 10;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            -webkit-transition: -webkit-transform 0.6s;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            will-change: transform;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .card.is-flipped {
            transform: translateZ(0) rotateY(180deg);
            -webkit-transform: translateZ(0) rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            padding: 25px;
            text-align: center;
            background-color: white;
            border: 2px solid #eee;
            overflow: hidden;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .card-front {
            z-index: 2;
        }

        .card-back {
            transform: rotateY(180deg) translateZ(0);
            -webkit-transform: rotateY(180deg) translateZ(0);
            background: #fff9db;
            justify-content: flex-start;
            padding-top: 60px;
        }

        .content-layer {
            position: relative;
            z-index: 5;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .q-char {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 150px;
            height: auto;
            opacity: 0.5;
            z-index: 1;
            pointer-events: none;
            display: none;
            user-select: none;
            -webkit-user-drag: none;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .type-tag {
            font-size: 12px;
            color: white;
            background: #4dabf7;
            padding: 4px 12px;
            border-radius: 50px;
            margin-bottom: 10px;
            font-weight: bold;
            position: relative;
            z-index: 5;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .word {
            font-size: 34px;
            color: #d63384;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 10px;
            position: relative;
            z-index: 5;
            line-height: 1.15;
            word-break: break-word;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .phonetic-box {
            font-size: 20px;
            color: #555;
            background-color: #f0f0f0;
            padding: 4px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            min-height: 35px;
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .chinese {
            font-size: 32px;
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.2;
            position: relative;
            z-index: 5;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .pos {
            font-size: 18px;
            color: #ae3ec9;
            font-weight: bold;
            margin-bottom: 15px;
            position: relative;
            z-index: 5;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .example {
            font-size: 19px;
            line-height: 1.5;
            color: #444;
            text-align: left;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            border-left: 6px solid var(--primary);
            width: 100%;
            box-sizing: border-box;
            font-style: italic;
            position: relative;
            z-index: 5;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .btn-group {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
            position: relative;
            padding-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            appearance: none;
            -webkit-appearance: none;
        }

        .audio-btn {
            background: var(--secondary);
            color: white;
        }

        .next-btn {
            background: var(--primary);
            color: white;
            width: 110px;
        }

        .prev-btn {
            background: #adb5bd;
            color: white;
            width: 110px;
        }

        .home-icon-btn {
            background: #5c7cfa;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        @media (max-width: 430px) {
            .card-container {
                width: calc(100vw - 24px);
                height: 470px;
            }

            .word {
                font-size: 30px;
            }

            .chinese {
                font-size: 28px;
            }

            .example {
                font-size: 17px;
            }

            .q-char {
                width: 135px;
            }
        }
    </style>
</head>
<body>
    <div id="fixed-bg"></div>

    <h3 class="page-title">Lesson 1: The Heart of a Champion</h3>
    <div id="progress">載入中...</div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <img src="img/aespa_k.png" id="char-k" class="q-char" alt="">
                <img src="img/aespa_g.png" id="char-g" class="q-char" alt="">
                <img src="img/aespa_w.png" id="char-w" class="q-char" alt="">
                <img src="img/aespa_n.png" id="char-n" class="q-char" alt="">

                <div class="content-layer">
                    <div id="tag-text" class="type-tag">單字</div>
                    <div class="word" id="front-text">Word</div>
                    <div class="phonetic-box" id="phonetic-text"></div>
                    <button class="audio-btn" onclick="speak(); event.stopPropagation();">🔊 聽發音</button>
                </div>
            </div>

            <div class="card-face card-back">
                <div class="content-layer">
                    <div class="pos" id="pos-text">n.</div>
                    <div class="chinese" id="back-text">中文翻譯</div>
                    <div class="example" id="example-text">Example sentence...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="prev-btn" onclick="prevCard(event)">上一個</button>
        <div class="home-icon-btn" onclick="location.href='index.html'">
            <span class="material-icons">home</span>
        </div>
        <button class="next-btn" onclick="nextCard(event)">下一個</button>
    </div>

    <script>
        const rawData = { "words": [
            { "w": "limp", "p": "[lɪmp]", "pos": "vi.", "c": "跛行", "e": "The runner had to limp to the finish line after hurting his ankle.", "t": "基礎字彙" },
            { "w": "relay race", "p": "[ˋrile res]", "pos": "n.", "c": "接力賽", "e": "Our class won the 400-meter relay race.", "t": "基礎字彙" },
            { "w": "baton", "p": "[bəˋtɑn]", "pos": "n.", "c": "接力棒", "e": "The runner passed the baton to her teammate.", "t": "基礎字彙" },
            { "w": "champion", "p": "[ˋtʃæmpɪən]", "pos": "n. [C]", "c": "冠軍", "e": "Howard will be crowned the world chess champion.", "t": "核心單字" },
            { "w": "dedication", "p": "[ˌdedəˋkeʃən]", "pos": "n. [U]", "c": "奉獻", "e": "Doctor Parker shows total dedication to this project.", "t": "核心單字" },
            { "w": "dedicate", "p": "[ˋdedəˌket]", "pos": "vt.", "c": "把……奉獻於", "e": "The author has dedicated himself to writing a book.", "t": "衍生字" },
            { "w": "medal", "p": "[ˋmedl]", "pos": "n. [C]", "c": "獎牌", "e": "Liz dreamed of wearing a shiny gold medal around her neck.", "t": "核心單字" },
            { "w": "injury", "p": "[ˋɪndʒərɪ]", "pos": "n.", "c": "受傷", "e": "After suffering a serious injury, the cyclist has no chance.", "t": "核心單字" },
            { "w": "injure", "p": "[ˋɪndʒɚ]", "pos": "vt.", "c": "使……受傷", "e": "Harry badly injured himself at the beach.", "t": "衍生字" },
            { "w": "success", "p": "[səkˋsɛs]", "pos": "n. [U]", "c": "成功", "e": "Monica had great success in her work.", "t": "核心單字" },
            { "w": "succeed", "p": "[səkˋsid]", "pos": "vi.", "c": "成功辦到", "e": "Kevin still succeeded in starting his own company.", "t": "衍生字" },
            { "w": "successful", "p": "[səkˋsɛsfəl]", "pos": "adj.", "c": "成功的", "e": "If you want to be successful in your job, work hard.", "t": "衍生字" },
            { "w": "pain", "p": "[pen]", "pos": "n.", "c": "疼痛", "e": "Alex experienced a sharp pain in his leg while hiking.", "t": "核心單字" },
            { "w": "painful", "p": "[ˋpenfəl]", "pos": "adj.", "c": "疼痛的", "e": "The soldier wants to forget his painful memories.", "t": "衍生字" },
            { "w": "immediately", "p": "[ɪˋmidɪtlɪ]", "pos": "adv.", "c": "立即", "e": "I need to leave immediately, or I'll miss my plane.", "t": "核心單字" },
            { "w": "immediate", "p": "[ɪˋmidɪt]", "pos": "adj.", "c": "立即的", "e": "The police took immediate action.", "t": "衍生字" },
            { "w": "collapse", "p": "[kəˋlæps]", "pos": "vi./n.", "c": "倒下", "e": "The woman felt dizzy and suddenly collapsed.", "t": "核心單字" },
            { "w": "medical", "p": "[ˋmedɪkl]", "pos": "adj.", "c": "醫療的", "e": "Lisa plans to attend medical school.", "t": "核心單字" },
            { "w": "staff", "p": "[stæf]", "pos": "n.", "c": "全體員工", "e": "The hotel staff greets all guests in a polite way.", "t": "核心單字" },
            { "w": "courage", "p": "[ˋkɜɪdʒ]", "pos": "n. [U]", "c": "勇氣", "e": "It takes courage to put your head under water.", "t": "核心單字" },
            { "w": "strength", "p": "[strɛŋθ]", "pos": "n. [U]", "c": "意志力", "e": "It's important for a player to have mental strength.", "t": "核心單字" },
            { "w": "strengthen", "p": "[ˋstrɛŋθən]", "pos": "vt.", "c": "強化", "e": "Spending holidays together strengthens family bonds.", "t": "衍生字" },
            { "w": "support", "p": "[səˋport]", "pos": "n./vt.", "c": "支持", "e": "The crowd cheered loudly to show their support.", "t": "核心單字" },
            { "w": "struggle", "p": "[ˋstrʌɡl]", "pos": "vi./n.", "c": "艱難前進", "e": "The truck struggled slowly up the steep hill.", "t": "核心單字" },
            { "w": "pride", "p": "[praɪd]", "pos": "n. [U]", "c": "驕傲", "e": "Neil took pride in his brother's determination.", "t": "核心單字" },
            { "w": "proud", "p": "[praʊd]", "pos": "adj.", "c": "驕傲的", "e": "Laura's parents were very proud of her.", "t": "衍生字" },
            { "w": "emotional", "p": "[ɪˋmoʃənl]", "pos": "adj.", "c": "情緒激動的", "e": "Mr. Jones got very emotional at graduation.", "t": "核心單字" },
            { "w": "emotion", "p": "[ɪˋmoʃən]", "pos": "n.", "c": "情感", "e": "It's hard for Danny to express his emotions.", "t": "衍生字" },
            { "w": "admiration", "p": "[ˌædməˋreʃən]", "pos": "n. [U]", "c": "欽佩", "e": "Fans showed their admiration for the actor.", "t": "核心單字" },
            { "w": "admire", "p": "[ədˋmaɪr]", "pos": "vt.", "c": "欽佩", "e": "Debbie deeply admires Jimmy for his generosity.", "t": "衍生字" },
            { "w": "respect", "p": "[rɪˋspɛkt]", "pos": "n./vt.", "c": "尊敬", "e": "Mike had great respect for the wise old man.", "t": "核心單字" },
            { "w": "take off", "p": "", "pos": "phr.", "c": "出發", "e": "The firefighters took off toward the building.", "t": "重要片語" },
            { "w": "have heart set on", "p": "", "pos": "phr.", "c": "一心想要", "e": "Toby has his heart set on being an NBA player.", "t": "重要片語" },
            { "w": "speed up", "p": "", "pos": "phr.", "c": "加速", "e": "We need to speed up to finish on time.", "t": "重要片語" },
            { "w": "rise to feet", "p": "", "pos": "phr.", "c": "站起來", "e": "He rose to his feet when the music started.", "t": "重要片語" },
            { "w": "carry through", "p": "", "pos": "phr.", "c": "渡過難關", "e": "His faith carried him through the tough times.", "t": "重要片語" }
        ] };

        let currentIndex = 0;
        const list = rawData.words;

        function forceRepaint(el) {
            el.style.display = 'none';
            void el.offsetHeight;
            el.style.display = '';
        }

        function updateCard() {
            const card = document.getElementById('card');

            card.classList.remove('is-flipped');

            // iPhone / Safari 強制重繪，避免殘影
            void card.offsetWidth;
            forceRepaint(card);

            const data = list[currentIndex];
            document.getElementById('tag-text').innerText = data.t;
            document.getElementById('front-text').innerText = data.w;
            document.getElementById('phonetic-text').innerText = data.p || "[ Phrase ]";
            document.getElementById('back-text').innerText = data.c;
            document.getElementById('pos-text').innerText = data.pos;
            document.getElementById('example-text').innerText = data.e;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${list.length}`;
        }

        function flipCard() {
            const card = document.getElementById('card');
            card.classList.toggle('is-flipped');
        }

        function nextCard(event) {
            event.stopPropagation();
            if (currentIndex < list.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                alert("全部背完囉！✨");
            }
        }

        function prevCard(event) {
            event.stopPropagation();
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function speak() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(list[currentIndex].w);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        window.onload = function() {
            // A. 網頁底圖
            const randomBg = Math.floor(Math.random() * 5) + 1;
            document.getElementById('fixed-bg').style.backgroundImage = `url('img/bg${randomBg}.jpg')`;

            // B. 亂數挑選 Q 版人物顯示
            const charIds = ['char-k', 'char-g', 'char-w', 'char-n'];
            const randomCharId = charIds[Math.floor(Math.random() * charIds.length)];
            document.getElementById(randomCharId).style.display = 'block';

            // C. 洗牌模式
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'shuffle') {
                for (let i = list.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [list[i], list[j]] = [list[j], list[i]];
                }
            }

            updateCard();
        };
    </script>
</body>
</html>
