<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY WORLD - English Mission</title>
    <style>
        :root {
            --aespa-purple: #ae3ec9;
            --aespa-blue: #4dabf7;
            --main-bg: #0b0e14;
            --neon-glow: 0 0 15px rgba(174, 62, 201, 0.7);
        }

        body {
            background-color: var(--main-bg);
            /* 設定預設背景樣式 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #e9ecef;
            font-family: 'Orbitron', 'PingFang TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-image 0.5s ease-in-out;
        }

        /* 增加一個半透明遮罩層，確保文字在任何底圖下都清晰 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* 40% 的黑色遮罩 */
            z-index: -1;
        }

        h1 {
            font-size: 3.5rem;
            margin-top: 60px;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--aespa-purple), var(--aespa-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        .subtitle {
            font-size: 1rem;
            color: var(--aespa-blue);
            margin-bottom: 40px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        /* 模式切換器 */
        .mode-selector {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 40px;
            display: flex;
            gap: 25px;
        }

        .mode-option {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: bold;
        }

        .mode-option input { display: none; }
        .mode-option span { color: #aaa; transition: 0.3s; }
        .mode-option input:checked + span {
            color: #fff;
            text-shadow: 0 0 10px var(--aespa-blue);
        }

        /* 課程卡片樣式微調 */
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }

        .lesson-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 25px;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
        }

        .lesson-card:hover {
            transform: translateY(-5px);
            border-color: var(--aespa-purple);
            box-shadow: 0 0 20px rgba(174, 62, 201, 0.3);
        }

        .lesson-card h3 { margin: 0; color: #fff; }
        .lesson-card p { color: #ccc; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body id="bg-body">

    <div class="overlay"></div>

    <h1>MY WORLD</h1>
    <div class="subtitle">synk dive into the flat</div>

    <div class="mode-selector">
        <label class="mode-option">
            <input type="radio" name="playMode" value="normal" checked>
            <span>▶ 順序 Sequential</span>
        </label>
        <label class="mode-option">
            <input type="radio" name="playMode" value="shuffle">
            <span>🔀 亂數 Shuffle</span>
        </label>
    </div>

    <div class="lesson-grid">
        <div class="lesson-card" onclick="goToLesson('L1')"><h3>Lesson 1</h3><p>Level Up Mission 01</p></div>
        <div class="lesson-card" onclick="goToLesson('L2')"><h3>Lesson 2</h3><p>Level Up Mission 02</p></div>
        <div class="lesson-card" onclick="goToLesson('L3')"><h3>Lesson 3</h3><p>Level Up Mission 03</p></div>
    </div>

    <script>
        // --- 亂數背景邏輯 ---
        const totalImages = 5; // 如果你放了 5 張圖，這裡就寫 5
        const randomNumber = Math.floor(Math.random() * totalImages) + 1;

        // 假設圖片路徑是 img/bg1.jpg, img/bg2.jpg ...
        const bgPath = `img/bg${randomNumber}.jpg`;

        // 套用背景
        document.body.style.backgroundImage = `url('${bgPath}')`;

        // --- 跳轉邏輯 ---
        function goToLesson(lessonId) {
            const mode = document.querySelector('input[name="playMode"]:checked').value;
            window.location.href = `${lessonId}.html?mode=${mode}`;
        }
    </script>
</body>
</html>
